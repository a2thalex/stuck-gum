name: refresh DRCOG snapshot

on:
  schedule:
    # 03:00 UTC daily
    - cron: "0 3 * * *"
  workflow_dispatch: {}

jobs:
  refresh:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: fetch DRCOG project_areas_2022
        run: |
          set -euo pipefail
          mkdir -p public
          curl --fail --silent --show-error \
            "https://gis.drcog.org/server/rest/services/RDC/project_areas_2022/MapServer/0/query?where=1%3D1&outFields=*&f=geojson&outSR=4326" \
            -o public/drcog-project-areas-2022.geojson
          wc -c public/drcog-project-areas-2022.geojson

      - name: commit if changed
        run: |
          set -euo pipefail
          git config user.name "stuck-gum-bot"
          git config user.email "bot@stuck-gum"
          if [[ -n "$(git status --porcelain public/drcog-project-areas-2022.geojson)" ]]; then
            git add public/drcog-project-areas-2022.geojson
            git commit -m "refresh DRCOG project_areas_2022 snapshot ($(date -u +%Y-%m-%dT%H:%MZ))"
            git push
          else
            echo "no changes; DRCOG snapshot already current"
          fi
